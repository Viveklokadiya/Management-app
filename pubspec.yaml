name: shree_giriraj_management
description: Internal transaction management app for Shree Giriraj Engineering
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.1.0
  google_sign_in: ^6.2.1

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # Location
  geolocator: ^12.0.0
  permission_handler: ^11.3.1

  # UI & Utilities
  intl: ^0.20.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10+1

  # Persistence
  shared_preferences: ^2.3.2

  # Icons
  cupertino_icons: ^1.0.6
  google_fonts: ^8.0.2
  flutter_map: ^8.2.2
  latlong2: ^0.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3
  custom_lint: ^0.7.6
  riverpod_lint: ^2.6.3

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
