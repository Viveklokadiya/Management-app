<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Splash Screen - Shree Giriraj Engineering</title>
<!-- Tailwind CSS CDN with plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style data-purpose="animations">
    /* Fade-in animation for the logo and text */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    /* Smooth pulse for the loading indicator */
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .animate-fade-in {
      animation: fadeIn 1s ease-out forwards;
    }

    .animate-loading-pulse {
      animation: pulse 1.5s ease-in-out infinite;
    }
  </style>
<style data-purpose="custom-typography">
    /* Navy blue color for branding consistency */
    .text-navy-blue {
      color: #001f3f;
    }
    .bg-navy-blue {
      background-color: #001f3f;
    }
  </style>
</head>
<body class="bg-white h-screen w-full overflow-hidden flex flex-col justify-between items-center">
<!-- BEGIN: MainContent -->
<main class="flex-grow flex flex-col justify-center items-center px-6" data-purpose="splash-container">
<!-- Logo and Branding Section -->
<div class="flex flex-col items-center animate-fade-in" data-purpose="branding-content">
<!-- Logo Container -->
<div class="w-24 h-24 mb-6 flex items-center justify-center border-4 border-[#001f3f] rounded-lg" data-purpose="company-logo">
<!-- Minimalist Steel/Engineering Icon Representation -->
<svg class="w-16 h-16 text-navy-blue" fill="none" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
<path d="M2 17L12 22L22 17" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
<path d="M2 12L12 17L22 12" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<!-- Company Name -->
<h1 class="text-2xl md:text-3xl font-bold tracking-tight text-navy-blue text-center uppercase" data-purpose="company-name">
        Shree Giriraj Engineering
      </h1>
<p class="mt-2 text-sm text-slate-500 font-medium tracking-widest uppercase" data-purpose="tagline">
        Precision &amp; Excellence
      </p>
</div>
</main>
<!-- END: MainContent -->
<!-- BEGIN: FooterLoading -->
<footer class="pb-16 flex flex-col items-center" data-purpose="loading-section">
<!-- Minimalist Loading Indicator -->
<div class="flex space-x-2" data-purpose="loading-dots">
<div class="w-2.5 h-2.5 bg-navy-blue rounded-full animate-loading-pulse" style="animation-delay: 0s;"></div>
<div class="w-2.5 h-2.5 bg-navy-blue rounded-full animate-loading-pulse" style="animation-delay: 0.2s;"></div>
<div class="w-2.5 h-2.5 bg-navy-blue rounded-full animate-loading-pulse" style="animation-delay: 0.4s;"></div>
</div>
<span class="mt-4 text-xs font-semibold text-slate-400 tracking-widest uppercase">
      Loading System
    </span>
</footer>
<!-- END: FooterLoading -->
<script data-purpose="interaction-logic">
    // Optional: Auto-redirect or transition after some time for splash screens
    document.addEventListener('DOMContentLoaded', () => {
      console.log('Shree Giriraj Engineering Splash Screen Loaded');
      // Potential logic to move to the main dashboard would go here.
    });
  </script>
</body></html>
