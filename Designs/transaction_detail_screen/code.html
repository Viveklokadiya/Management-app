<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Transaction Detail</title>
<!-- BEGIN: External Scripts -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- END: External Scripts -->
<style data-purpose="custom-typography">
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body {
      font-family: 'Inter', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }
  </style>
<style data-purpose="layout-adjustments">
    .ios-safe-area-bottom {
      padding-bottom: env(safe-area-inset-bottom);
    }
    .ios-safe-area-top {
      padding-top: env(safe-area-inset-top);
    }
  </style>
</head>
<body class="bg-gray-50 text-slate-900 min-h-screen flex flex-col">
<!-- BEGIN: Navigation Header -->
<header class="ios-safe-area-top bg-white border-b border-gray-200 sticky top-0 z-10" data-purpose="screen-header">
<div class="px-4 h-14 flex items-center justify-between">
<button aria-label="Go back" class="p-2 -ml-2 text-slate-600 active:opacity-50">
<svg fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="m15 18-6-6 6-6"></path></svg>
</button>
<h1 class="text-base font-semibold">Transaction Details</h1>
<button class="p-2 -mr-2 text-blue-600 font-medium active:opacity-50">
        Edit
      </button>
</div>
</header>
<!-- END: Navigation Header -->
<!-- BEGIN: Main Content -->
<main class="flex-1 overflow-y-auto" data-purpose="transaction-details-content">
<!-- BEGIN: Hero Section (Amount) -->
<section class="bg-white px-4 py-8 text-center border-b border-gray-100" data-purpose="transaction-hero">
<p class="text-sm font-medium text-slate-500 uppercase tracking-wider mb-2">Total Amount</p>
<div class="flex flex-col items-center">
<span class="text-4xl font-bold text-slate-900" id="transaction-amount">$1,240.00</span>
<span class="mt-2 inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800">
          Completed
        </span>
</div>
</section>
<!-- END: Hero Section -->
<!-- BEGIN: Detail Card -->
<div class="p-4">
<div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden" data-purpose="detail-list-container">
<!-- Type Section -->
<div class="px-4 py-4 border-b border-gray-50 flex justify-between items-center">
<span class="text-sm text-slate-500">Type</span>
<span class="text-sm font-semibold text-slate-900">Purchase</span>
</div>
<!-- Site Name Section -->
<div class="px-4 py-4 border-b border-gray-50 flex justify-between items-center">
<span class="text-sm text-slate-500">Site Name</span>
<span class="text-sm font-semibold text-slate-900">Apple Store Online</span>
</div>
<!-- Payment Method Section -->
<div class="px-4 py-4 border-b border-gray-50 flex justify-between items-center">
<span class="text-sm text-slate-500">Payment Method</span>
<div class="flex items-center gap-2">
<div class="w-8 h-5 bg-slate-100 rounded flex items-center justify-center text-[8px] font-bold text-slate-400 border border-slate-200">VISA</div>
<span class="text-sm font-semibold text-slate-900">•••• 4242</span>
</div>
</div>
<!-- Date Section -->
<div class="px-4 py-4 border-b border-gray-50 flex justify-between items-center">
<span class="text-sm text-slate-500">Date</span>
<span class="text-sm font-semibold text-slate-900">Oct 24, 2023</span>
</div>
<!-- Created At Section -->
<div class="px-4 py-4 border-b border-gray-50 flex justify-between items-center">
<span class="text-sm text-slate-500">Created At</span>
<span class="text-sm font-semibold text-slate-900">14:32:05</span>
</div>
<!-- Remarks Section -->
<div class="px-4 py-4 flex flex-col gap-1">
<span class="text-sm text-slate-500">Remarks</span>
<p class="text-sm text-slate-700 leading-relaxed">
            iPhone 15 Pro Max Upgrade - 256GB Titanium Blue. Reference #REF-99283-A.
          </p>
</div>
</div>
</div>
<!-- END: Detail Card -->
<!-- BEGIN: Location Footer -->
<section class="px-4 py-6" data-purpose="location-info">
<div class="flex items-start gap-3 opacity-60">
<svg class="mt-0.5" fill="none" height="16" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="16" xmlns="http://www.w3.org/2000/svg"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"></path><circle cx="12" cy="10" r="3"></circle></svg>
<div class="flex flex-col">
<span class="text-xs font-semibold uppercase tracking-tight">Location</span>
<span class="text-xs">Cupertino, California, United States</span>
</div>
</div>
</section>
<!-- END: Location Footer -->
</main>
<!-- END: Main Content -->
<!-- BEGIN: Bottom Actions -->
<footer class="ios-safe-area-bottom p-4 bg-white border-t border-gray-200" data-purpose="footer-actions">
<button class="w-full h-12 bg-slate-900 text-white rounded-xl font-semibold active:scale-[0.98] transition-transform">
      Download Receipt
    </button>
</footer>
<!-- END: Bottom Actions -->
</body></html>
